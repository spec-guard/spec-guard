name: release

# Manual publish fallback. The primary publish runs inside release-please.yml gated on
# release_created (a release-please release is created by GITHUB_TOKEN, whose events do not
# trigger other workflows). This workflow stays as a manual safety valve — run it from the
# Actions tab / `gh workflow run release.yml` to (re)publish whatever version is on main.
# `release: published` is kept for manually-created GitHub Releases (a human PAT fires it).
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci || npm install
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
